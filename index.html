<title>NoKarl — where the fog isn't, in San Francisco</title>
<meta name="description" content="Karl doesn't own the whole city. Go find the rest. Twelve San Francisco spots scored on low cloud, visibility, wind and comfort.">
<meta name="theme-color" content="#0E161C">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta property="og:description" content="Where the fog isn't, in San Francisco.">

<style>
:root{
  --ink:#0E161C; --ink-2:#16222A;
  --line:rgba(169,183,190,.18); --line-hi:rgba(169,183,190,.34);
  --fog:#A9B7BE; --fog-dim:#63757C; --fog-faint:#3B4A52;
  --clear:#F0A03C; --clear-dim:#9A6520;
  --paper:#E9EAE4;
  --disp:'Bricolage Grotesque', system-ui, sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  --msg:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
  --pad:16px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--ink); color:var(--paper);
  font-family:var(--msg); line-height:1.45; font-size:17px;
  padding:calc(18px + env(safe-area-inset-top)) calc(var(--pad) + env(safe-area-inset-right))
          calc(44px + env(safe-area-inset-bottom)) calc(var(--pad) + env(safe-area-inset-left));
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
::selection{background:var(--clear); color:var(--ink)}
.wrap{max-width:760px; margin:0 auto}

/* ══ masthead + segmented toggle ════════════════════════════════ */
.eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.15em; text-transform:uppercase;
  color:var(--fog-dim); display:flex; justify-content:space-between; align-items:center;
  gap:10px; padding-bottom:10px; border-bottom:1px solid var(--line)}
.badge{font-family:var(--mono); font-size:11px; letter-spacing:.08em; padding:5px 8px;
  border:1px solid var(--line-hi); border-radius:2px; color:var(--fog); white-space:nowrap}
.badge.live{color:var(--clear); border-color:var(--clear-dim)}

.titlerow{display:flex; align-items:center; justify-content:space-between; gap:14px; margin:22px 0 10px}
h1{margin:0; flex:0 1 auto; min-width:0}
/* wordmark x-height = 124/196 of image → 62px pill ÷ .633 ≈ 98px */
h1 img{display:block; height:98px; width:auto; max-width:100%; object-fit:contain}

/* From Uiverse.io by MuhammadHasann */
.toggle-cont {
  --h: 50px; --p: 6px; --gl: 24px; --glc: 20px;
  width: calc(var(--h) * 2);
  height: var(--h);
  border-radius: 9999px;
  flex: 0 0 auto;
  position: relative;
  margin: var(--p);
}

.toggle-cont .toggle-input {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
  margin: 0;
  pointer-events: none;
}

.toggle-cont .toggle-label {
  cursor: pointer;
  position: relative;
  display: inline-block;
  padding: var(--p);
  width: 100%;
  height: 100%;
  background: var(--ink-2);
  border: 1px solid var(--line);
  border-radius: 9999px;
  box-sizing: content-box;
}

.toggle-cont .toggle-input:focus-visible + .toggle-label {
  outline: 2px solid var(--clear);
  outline-offset: 4px;
}

.toggle-cont .toggle-label .cont-label-play {
  position: relative;
  width: var(--h);
  aspect-ratio: 1 / 1;
  background: var(--clear);
  border-radius: 9999px;
  transition: all 0.5s cubic-bezier(1, 0, 0, 1);
}

.toggle-cont .toggle-input:checked + .toggle-label .cont-label-play {
  background: var(--ink);
  transform: translateX(var(--h));
}

.toggle-cont .toggle-label .label-play {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: inline-block;
  width: var(--gl);
  aspect-ratio: 1 / 1;
  background: #fefefe;
  border-radius: 6px;
  clip-path: polygon(25% 10%, 26% 4.5%, 30.5% 4%, 35% 10%, 66% 41%, 71.5% 46.5%,
                    71.5% 53.5%, 66% 59%, 35% 90%, 30.5% 96%, 26% 95.5%, 25% 90%);
  transition: all 0.5s cubic-bezier(1, 0, 0, 1);
}

@media (max-width: 559px){
  .toggle-cont{ --h:34px; --p:4px; --gl:16px; --glc:13px }
  /* 42px pill ÷ .633 ≈ 66px */
  h1 img{height:66px}
}

.toggle-cont .toggle-input:checked + .toggle-label .label-play {
  width: var(--glc);
  clip-path: polygon(0 10%, 0 2%, 2% 0, 10% 0, 98% 0, 100% 2%,
                    100% 98%, 98% 100%, 10% 100%, 2% 100%, 0 98%, 0 90%);
}

svg.g{fill:currentColor}

.sub{max-width:50ch; color:var(--fog); font-size:16px; margin:0 0 24px}

/* ══ swipeable cards, no chrome ═════════════════════════════════ */
.cards{display:flex; gap:12px; overflow-x:auto; scroll-snap-type:x mandatory;
  scroll-behavior:smooth; scrollbar-width:none; -ms-overflow-style:none;
  margin:0 calc(-1 * var(--pad)); padding:2px var(--pad) 4px}
.cards::-webkit-scrollbar{display:none}
.card{flex:0 0 min(100%, 460px); scroll-snap-align:center;
  min-height:288px; display:flex; flex-direction:column;
  background:var(--paper); color:#12181C; border-radius:18px; padding:18px 18px 20px}
.c-head{display:flex; align-items:center; gap:8px; font-family:var(--mono);
  font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#5A676E}
.ic{width:18px;height:18px;border-radius:5px;background:var(--clear);
  display:grid;place-items:center;color:#12181C}
.ic svg{width:12px;height:12px}
.c-when{margin-left:auto; color:#12181C; font-weight:600; letter-spacing:.05em}

.c-hero{display:flex; align-items:center; gap:14px; margin:20px 0 18px}
.c-ico{flex:0 0 auto; width:56px; height:56px; border-radius:15px; background:var(--clear);
  color:#12181C; display:grid; place-items:center}
.c-ico svg{width:30px; height:30px}
.c-name{display:block; font-family:var(--disp); font-weight:700; font-size:25px;
  line-height:1.04; letter-spacing:-.022em}
.c-area{display:block; font-family:var(--mono); font-size:11px; letter-spacing:.14em;
  text-transform:uppercase; color:#6C7A81; margin-top:6px}

.c-stat{display:flex; align-items:center; gap:16px; margin-top:auto;
  padding-top:16px; border-top:1px solid rgba(18,24,28,.14)}
.c-temp{font-family:var(--disp); font-weight:700; font-size:44px; line-height:1; letter-spacing:-.04em}
.c-cond{font-family:var(--mono); font-size:12.5px; line-height:1.7; color:#4C6672; letter-spacing:.02em}
.c-cond b{color:#12181C; font-weight:400}
.c-2{margin:16px 0 0; font-size:16px; color:#3F5966; line-height:1.4}

.nav{display:flex; justify-content:center; gap:7px; margin:16px 0 26px}
.nav button{width:32px; height:24px; padding:0; background:none; border:0; cursor:pointer;
  display:grid; place-items:center; -webkit-tap-highlight-color:transparent}
.nav i{display:block; width:100%; height:3px; border-radius:2px;
  background:var(--fog-faint); transition:background .3s}
.nav button[aria-current="true"] i{background:var(--clear)}
.nav button:focus-visible{outline:2px solid var(--clear); outline-offset:1px; border-radius:3px}

/* ══ marine push (fallback only) ════════════════════════════════ */
.lab{font-family:var(--mono); font-size:11px; letter-spacing:.15em;
  text-transform:uppercase; color:var(--fog-dim); display:block; margin-bottom:8px}
input[type=range]{width:100%; accent-color:var(--clear); height:38px; margin:0 0 22px}

/* ══ ridge ══════════════════════════════════════════════════════ */
.ridge{border:1px solid var(--line); border-radius:5px; background:var(--ink-2);
  padding:13px 18px 11px; margin-bottom:30px; overflow:hidden}
.ridge-head{display:flex; justify-content:space-between; gap:8px; font-family:var(--mono);
  font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--fog-dim); margin-bottom:9px}
.ridge-head b{color:var(--fog); font-weight:400; text-align:center}
.stage{position:relative; width:100%; aspect-ratio:900/250}
.stage svg{position:absolute; inset:0; width:100%; height:100%; display:block}
.dot{position:absolute; width:13px; height:13px; margin:-6.5px 0 0 -6.5px; border-radius:50%;
  background:var(--fog-faint); border:1px solid var(--fog-dim);
  transition:background .5s ease, border-color .5s ease, transform .5s cubic-bezier(.2,.7,.3,1)}
.dot.on{background:var(--clear); border-color:var(--clear); transform:scale(1.3)}
/* label rail: horizontal names in staggered rows, a tick per dot */
.rail{position:relative; height:68px}
.rail .r0{--row:0}.rail .r1{--row:1}.rail .r2{--row:2}.rail .r3{--row:3}
.rail i{position:absolute; top:0; width:1px; margin-left:-.5px;
  height:calc(5px + var(--row)*15px); background:var(--fog-faint)}
.rail i.on{background:var(--clear-dim)}
.rail b{position:absolute; top:calc(6px + var(--row)*15px); transform:translateX(-50%);
  font-family:var(--msg); font-size:11.5px; font-weight:400; letter-spacing:0;
  color:var(--fog); white-space:nowrap; line-height:1.3}
.rail b.el{transform:none}
.rail b.er{transform:translateX(-100%)}
.rail b.on{color:var(--clear)}
.rail b.pick{font-weight:600}

/* ══ full data ══════════════════════════════════════════════════ */
.ph{font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--fog-dim); margin:0 0 4px; padding-bottom:9px; border-bottom:1px solid var(--line-hi);
  display:flex; justify-content:space-between; gap:10px}
.ph b{color:var(--clear); font-weight:400}
.tr{display:grid; grid-template-columns:22px 26px 1fr 62px; gap:10px; align-items:center;
  padding:12px 0; border-bottom:1px solid var(--line)}
.rk{font-family:var(--mono); font-size:12px; color:var(--fog-faint)}
.ri{color:var(--fog-dim); display:grid; place-items:center}
.ri svg{width:22px; height:22px}
.tr.top .ri{color:var(--clear)}
.nm{font-size:16px; font-weight:500; line-height:1.25}
.nm em{font-style:normal; display:block; font-size:13px; color:var(--fog-dim); font-weight:400; margin-top:2px}
.strip{display:block; font-family:var(--mono); font-size:12px; color:var(--fog-dim); margin-top:5px}
.strip s{text-decoration:none; color:var(--fog)}
.sc{text-align:right}
.sc u{font-family:var(--mono); font-size:14px; text-decoration:none; color:var(--fog); display:block; margin-bottom:5px}
.bar{height:4px; background:var(--fog-faint); border-radius:2px; overflow:hidden}
.bar i{display:block; height:100%; background:var(--fog-dim); transition:width .55s cubic-bezier(.2,.7,.3,1)}
.tr.top .bar i{background:var(--clear)}
.tr.top .nm,.tr.top .sc u{color:var(--clear)}

.method{margin-top:26px; padding-top:15px; border-top:1px solid var(--line);
  font-family:var(--mono); font-size:12px; line-height:1.85; color:var(--fog-dim)}
.method b{color:var(--fog); font-weight:400}
.attr{margin-top:18px; font-family:var(--mono); font-size:11px; line-height:1.8; color:var(--fog-faint)}
.attr a{color:var(--fog-dim)}

@media(min-width:560px){
  :root{--pad:24px}
  .stage{aspect-ratio:900/220}
  .rail{height:40px}
  .rail .d0{--row:0}.rail .d1{--row:1}
  .rail b{font-size:12px}
  .card{min-height:300px; padding:22px}
  .c-name{font-size:28px}
  .tr{grid-template-columns:26px 30px 1fr 88px; gap:14px}
}
@media(min-width:860px){ .stage{aspect-ratio:900/190} }
@media(prefers-reduced-motion:reduce){ .cards{scroll-behavior:auto} .dot,.bar i,.cont-label-play,.label-play{transition:none} }
</style>
</head>

<div class="wrap">

  <div class="eyebrow">
    <span>RFC-001 / Prototype</span>
    <span class="badge" id="src">Connecting…</span>
  </div>

  <div class="titlerow">
    <h1><img src="logo.png" alt="Karl" width="638" height="196"></h1>
    <div class="toggle-cont">
      <input class="toggle-input" id="modeToggle" type="checkbox" role="switch"
             aria-label="Chill mode. Off is Move mode.">
      <label class="toggle-label" for="modeToggle">
        <div class="cont-label-play">
          <span class="label-play"></span>
        </div>
      </label>
    </div>
  </div>

  <p class="sub">Karl doesn't own the whole city. Go find the rest.</p>

  <div class="cards" id="cards" tabindex="0" role="region" aria-label="Forecast, swipe for later time slices"></div>
  <div class="nav" id="nav"></div>

  <div id="simWrap" hidden>
    <span class="lab">Marine push <b id="pushVal" style="color:var(--clear);font-weight:400">50</b></span>
    <input type="range" id="push" min="0" max="100" value="50" aria-label="Marine layer strength">
  </div>

  <div class="ridge">
    <div class="ridge-head"><span>← West</span><b id="ridgeState">Marine layer</b><span>East →</span></div>
    <div class="stage">
      <svg viewBox="0 0 900 250" preserveAspectRatio="none" aria-label="Cross section of San Francisco from Ocean Beach to India Basin showing where low cloud sits against the Twin Peaks ridge">
        <defs><linearGradient id="fg" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#A9B7BE" stop-opacity=".55"/>
          <stop offset="70%" stop-color="#A9B7BE" stop-opacity=".30"/>
          <stop offset="100%" stop-color="#A9B7BE" stop-opacity="0"/>
        </linearGradient></defs>
        <path id="fogBody" d="" fill="url(#fg)" style="transition:d .7s ease"/>
        <path id="terrain" d="" fill="#1E2B33" stroke="rgba(169,183,190,.34)" stroke-width="1" vector-effect="non-scaling-stroke"/>
      </svg>
      <div id="dots"></div>
    </div>
    <div class="rail" id="rail"></div>
  </div>

  <h2 class="ph"><span>All twelve spots</span><b id="sliceTag">Now</b></h2>
  <div id="board"></div>

  <div class="method" id="method"></div>
  <p class="attr">
    Weather data by <a href="https://open-meteo.com/" rel="noopener">Open-Meteo.com</a>, CC BY 4.0.
    Non-commercial use. Fog climatology is a static local estimate, not measured.
  </p>
</div>

 fogx:'<path d="M120,208H72a8,8,0,0,1,0-16h48a8,8,0,0,1,0,16Zm64-16H160a8,8,0,0,0,0,16h24a8,8,0,0,0,0-16Zm-24,32H104a8,8,0,0,0,0,16h56a8,8,0,0,0,0-16Zm72-124a76.08,76.08,0,0,1-76,76H76A52,52,0,0,1,76,72a53.26,53.26,0,0,1,8.92.76A76.08,76.08,0,0,1,232,100Zm-16,0A60.06,60.06,0,0,0,96,96.46a8,8,0,0,1-16-.92q.21-3.66.77-7.23A38.11,38.11,0,0,0,76,88a36,36,0,0,0,0,72h80A60.07,60.07,0,0,0,216,100Z"/>',
 sun:'<path d="M116,36V20a12,12,0,0,1,24,0V36a12,12,0,0,1-24,0Zm80,92a68,68,0,1,1-68-68A68.07,68.07,0,0,1,196,128Zm-24,0a44,44,0,1,0-44,44A44.05,44.05,0,0,0,172,128ZM51.51,68.49a12,12,0,1,0,17-17l-12-12a12,12,0,0,0-17,17Zm0,119-12,12a12,12,0,0,0,17,17l12-12a12,12,0,1,0-17-17ZM196,72a12,12,0,0,0,8.49-3.51l12-12a12,12,0,0,0-17-17l-12,12A12,12,0,0,0,196,72Zm8.49,115.51a12,12,0,0,0-17,17l12,12a12,12,0,0,0,17-17ZM48,128a12,12,0,0,0-12-12H20a12,12,0,0,0,0,24H36A12,12,0,0,0,48,128Zm80,80a12,12,0,0,0-12,12v16a12,12,0,0,0,24,0V220A12,12,0,0,0,128,208Zm108-92H220a12,12,0,0,0,0,24h16a12,12,0,0,0,0-24Z"/>'
};
const ico=(k,cls)=>`<svg class="g ${cls||''}" viewBox="0 0 256 256" aria-hidden="true">${G[k]}</svg>`;

const SPOTS=[
 {n:"Ocean Beach",          a:"Outer Sunset",    g:"wave", lat:37.7590,lon:-122.5100,rel:26,x:40,y:218,m:"Ocean Beach"},
 {n:"Golden Gate Park",     a:"Conservatory",    g:"tree", lat:37.7720,lon:-122.4600,rel:48,x:232,y:200,m:"GG Park"},
 {n:"Twin Peaks",           a:"the ridge",       g:"peak", lat:37.7544,lon:-122.4477,rel:55,x:307,y:104,m:"Twin Peaks"},
 {n:"Glen Canyon Park",     a:"Glen Park",       g:"tree", lat:37.7400,lon:-122.4430,rel:68,x:360,y:158,m:"Glen Park"},
 {n:"Corona Heights",       a:"Castro",          g:"peak", lat:37.7650,lon:-122.4380,rel:62,x:414,y:142,m:"Corona"},
 {n:"Fort Mason",           a:"Marina Green",    g:"sail", lat:37.8060,lon:-122.4320,rel:52,x:470,y:190,m:"Fort Mason"},
 {n:"Mission Dolores Park", a:"Mission",         g:"palm", lat:37.7596,lon:-122.4269,rel:78,x:522,y:196,m:"Mission"},
 {n:"McLaren Park",         a:"Excelsior",       g:"tree", lat:37.7180,lon:-122.4180,rel:79,x:578,y:172,m:"McLaren"},
 {n:"Bernal Heights Park",  a:"Bernal",          g:"peak", lat:37.7431,lon:-122.4160,rel:82,x:640,y:156,m:"Bernal"},
 {n:"Potrero Hill",         a:"McKinley Square", g:"slope",lat:37.7600,lon:-122.3990,rel:84,x:722,y:182,m:"Potrero"},
 {n:"Crane Cove Park",      a:"Dogpatch",        g:"crane",lat:37.7615,lon:-122.3872,rel:85,x:794,y:212,m:"Dogpatch"},
 {n:"India Basin",          a:"Bayview",         g:"crane",lat:37.7370,lon:-122.3775,rel:88,x:860,y:218,m:"Bayview"}
];
const MODES={
 move :{c:.35,v:.15,w:.30,t:.20,ideal:60,verb:"a 4-mile loop"},
 chill:{c:.48,v:.10,w:.18,t:.24,ideal:72,verb:"20 minutes from downtown"}
};
const SLICES=[
 {label:"Now",         off:0,  sim:0},
 {label:"In 3 hours",  off:3,  sim:14},
 {label:"In 6 hours",  off:6,  sim:24},
 {label:"In 12 hours", off:12, sim:-6},
 {label:"Tomorrow",    off:24, sim:4}
];
const ROTATE=5600, RESUME=14000, VBW=900, VBH=250, GROUND=246;

/* Catmull-Rom → cubic bezier, so the section reads as rolling ground */
function smooth(pts){
  const p=[{x:-70,y:pts[0].y+8},...pts,{x:VBW+70,y:pts[pts.length-1].y+6}];
  let d=`L${p[1].x},${p[1].y}`;
  for(let i=1;i<p.length-2;i++){
    const a=p[i-1],b=p[i],c=p[i+1],e=p[i+2],k=7;
    d+=` C${(b.x+(c.x-a.x)/k).toFixed(1)},${(b.y+(c.y-a.y)/k).toFixed(1)}`
      +` ${(c.x-(e.x-b.x)/k).toFixed(1)},${(c.y-(e.y-b.y)/k).toFixed(1)} ${c.x},${c.y}`;
  }
  return d;
}
const RIDGE=[{x:0,y:224},...SPOTS.map(s=>({x:s.x,y:s.y})),{x:VBW,y:222}];
let S={mode:"move",push:50,slices:null,i:0}, timer=null, idle=null;
const $=i=>document.getElementById(i), cl=(v,a,b)=>Math.max(a,Math.min(b,v));
const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
const TZ="America/Los_Angeles";
const hhmm=e=>new Intl.DateTimeFormat("en-US",{timeZone:TZ,hour:"numeric",minute:"2-digit"}).format(new Date(e*1000));
const dow =e=>new Intl.DateTimeFormat("en-US",{timeZone:TZ,weekday:"short"}).format(new Date(e*1000));

function score(d,m){const M=MODES[m];return Math.round(
  (100-cl(d.lowCloud,0,100))*M.c + (cl(d.vis/16000,0,1)*100)*M.v +
  (100-cl((d.wind-8)*5,0,100))*M.w + (100-cl(Math.abs(d.temp-M.ideal)*5.5,0,100))*M.t);}

function simulate(p){
  const now=Math.floor(Date.now()/1000);
  return SLICES.map(sl=>{
    const pp=cl(p+sl.sim,0,100);
    return {label:sl.label, t:now+sl.off*3600, spots:SPOTS.map(s=>{
      const ex=(100-s.rel)/100;
      let low=cl(pp*1.55*ex-8+(Math.random()*8-4),0,100);
      if(s.n==="Twin Peaks"&&pp>62) low=cl(low-42,0,100);
      return {...s, lowCloud:low, temp:Math.round(70-low*.17-pp*.03+(Math.random()*3-1.5)),
              wind:Math.round(6+pp*.11+ex*13+Math.random()*4),
              vis:low>70?900+Math.random()*2500:16000-low*100};
    })};
  });
}

async function fetchLive(){
  const u="https://api.open-meteo.com/v1/forecast"
   +"?latitude="+SPOTS.map(s=>s.lat).join(",")+"&longitude="+SPOTS.map(s=>s.lon).join(",")
   +"&current=temperature_2m,cloud_cover_low,visibility,wind_speed_10m"
   +"&hourly=temperature_2m,cloud_cover_low,visibility,wind_speed_10m"
   +"&forecast_days=3&timeformat=unixtime&temperature_unit=fahrenheit"
   +"&wind_speed_unit=mph&timezone="+TZ;
  const c=new AbortController(), to=setTimeout(()=>c.abort(),8000);
  const r=await fetch(u,{signal:c.signal}); clearTimeout(to);
  if(!r.ok) throw new Error(r.status);
  const j=await r.json(), A=Array.isArray(j)?j:[j];
  const T=A[0].hourly.time, now=Math.floor(Date.now()/1000);
  let base=T.findIndex(t=>t>now); base=base<1?0:base-1;
  return SLICES.map((sl,k)=>{
    const idx=Math.min(base+sl.off,T.length-1);
    return {label:sl.label, t:k===0?now:T[idx], spots:SPOTS.map((s,i)=>{
      const h=A[i].hourly, c0=A[i].current;
      const v = k===0
        ? {temp:c0.temperature_2m,low:c0.cloud_cover_low,vis:c0.visibility,wind:c0.wind_speed_10m}
        : {temp:h.temperature_2m[idx],low:h.cloud_cover_low[idx],vis:h.visibility[idx],wind:h.wind_speed_10m[idx]};
      return {...s, lowCloud:v.low??0, temp:Math.round(v.temp), wind:Math.round(v.wind), vis:v.vis??16000};
    })};
  });
}

const rankAt=k=>S.slices[k].spots.map(d=>({...d,score:score(d,S.mode)}))
                 .sort((a,b)=>b.score-a.score||b.rel-a.rel);

function cardHTML(sl,k){
  const rk=rankAt(k), top=rk[0], next=rk[1], worst=rk[rk.length-1], M=MODES[S.mode];
  const when=(k===4?dow(sl.t)+" ":"")+hhmm(sl.t);
  const head=`<div class="c-head"><span class="ic">${ico("sun")}</span><span>NoKarl</span>
    <span class="c-when">${sl.label} · ${when}</span></div>`;
  if(top.score<55) return `<article class="card">${head}
    <div class="c-hero"><span class="c-ico">${ico("fogx")}</span>
      <span><span class="c-name">Nothing's clear</span><span class="c-area">City-wide</span></span></div>
    <div class="c-stat"><span class="c-temp">—</span>
      <span class="c-cond">low cloud<br><b>Ocean Beach to the Bay</b></span></div>
    <p class="c-2">${k===0?"I'd rather stay quiet than send you somewhere grey.":"Try one of the other cards."}</p>
  </article>`;
  const line = k===0
    ? `${worst.n} is at ${worst.temp}° under low cloud, so go east. About ${M.verb}.`
    : `${next.n} is the backup at ${next.temp}°. ${worst.n} stays socked in.`;
  return `<article class="card" aria-roledescription="slide" aria-label="${sl.label}">${head}
    <div class="c-hero"><span class="c-ico">${ico(top.g)}</span>
      <span><span class="c-name">${top.n}</span><span class="c-area">${top.a}</span></span></div>
    <div class="c-stat"><span class="c-temp">${top.temp}°</span>
      <span class="c-cond"><b>${Math.round(top.lowCloud)}%</b> low cloud<br><b>${top.wind}</b> mph wind</span></div>
    <p class="c-2">${line}</p></article>`;
}

/* clone of last + the five + clone of first, so the swipe never hits a wall */
const SEQ=[4,0,1,2,3,4,0];
function paintCards(){
  const html=S.slices.map(cardHTML);
  $("cards").innerHTML=SEQ.map(k=>html[k]).join("");
  $("nav").innerHTML=S.slices.map((sl,k)=>
    `<button data-i="${k}" aria-current="${k===S.i}" aria-label="${sl.label}"><i></i></button>`).join("");
  jump(S.i+1);
}

function paintSlice(){
  const k=S.i, rk=rankAt(k), sl=S.slices[k];
  $("sliceTag").textContent=sl.label;
  [...$("nav").children].forEach((b,j)=>b.setAttribute("aria-current",String(j===k)));

  $("board").innerHTML=rk.map((s,i)=>`
    <div class="tr ${i===0?'top':''}">
      <span class="rk">${String(i+1).padStart(2,"0")}</span>
      <span class="ri">${ico(s.g)}</span>
      <span><span class="nm">${s.n}<em>${s.a}</em></span>
        <span class="strip"><s>${s.temp}°</s> · ${s.wind} mph · ${Math.round(s.lowCloud)}% low cloud · ${s.rel}% clear yr</span></span>
      <span class="sc"><u>${s.score}</u><span class="bar"><i style="width:${s.score}%"></i></span></span>
    </div>`).join("");

  const pick=rk[0].n;
  $("dots").innerHTML=sl.spots.map((s,j)=>{
    const on=s.lowCloud<45;
    return `<span class="dot ${on?'on':''} ${s.n===pick?'pick':''}" title="${s.n}"
      style="left:${(s.x/VBW*100).toFixed(2)}%; top:${(s.y/VBH*100).toFixed(2)}%"></span>`;
  }).join("");
  $("rail").innerHTML=sl.spots.map((s,j)=>{
    const on=s.lowCloud<45, L=(s.x/VBW*100).toFixed(2),
          rows=`r${j%4} d${j%2}`,
          edge=j===0?'el':(j===sl.spots.length-1?'er':'');
    return `<i class="${rows} ${on?'on':''}" style="left:${L}%"></i>`
         + `<b class="${rows} ${edge} ${on?'on':''} ${s.n===pick?'pick':''}" style="left:${L}%">${s.m}</b>`;
  }).join("");

  const w=sl.spots.slice(0,4).reduce((t,s)=>t+s.lowCloud,0)/4,
        e=sl.spots.slice(-4).reduce((t,s)=>t+s.lowCloud,0)/4,
        wy=GROUND-w*1.55, ey=GROUND-e*1.55;
  $("fogBody").setAttribute("d",
    `M0,${GROUND} L0,${wy} C240,${wy-18} 330,${wy+12} 400,${(wy+ey)/2} C520,${ey-10} 700,${ey} ${VBW},${ey} L${VBW},${GROUND} Z`);
  $("ridgeState").textContent=w>60?(e>55?"City-wide marine layer":"Fog held at the ridge"):"Clear west to east";

  const M=MODES[S.mode];
  $("method").innerHTML=`<b>Score</b> = clarity×${M.c} + visibility×${M.v} + wind comfort×${M.w} + temperature fit×${M.t}. `+
   `<b>Clarity</b> = 100 − low cloud. <b>Wind comfort</b> falls off above 8 mph. `+
   `<b>Temperature fit</b> centers on ${M.ideal}°F for ${S.mode}. `+
   `<b>Clear yr</b> is a static climatology estimate used as the tiebreak. `+
   `<b>Quiet rule</b>: no place is named below a score of 55.`;
}
$("terrain").setAttribute("d", `M0,${GROUND} `+smooth(RIDGE)+` L${VBW},${GROUND} Z`);

const render=()=>{paintCards(); paintSlice();};

/* ── carousel: loops in both directions ───────────────────────── */
const cards=$("cards");
const width=()=>cards.firstElementChild ? cards.firstElementChild.offsetWidth+12 : cards.clientWidth;
const jump=p=>cards.scrollTo({left:p*width(), behavior:"auto"});
const glide=p=>cards.scrollTo({left:p*width(), behavior:reduce?"auto":"smooth"});
function go(k){ S.i=((k%5)+5)%5; glide(S.i+1); paintSlice(); }
function start(){ if(reduce) return; stop(); timer=setInterval(()=>{
  const p=Math.round(cards.scrollLeft/width()); glide(p+1);
},ROTATE); }
function stop(){ clearInterval(timer); timer=null; }
function pause(){ stop(); clearTimeout(idle); idle=setTimeout(start,RESUME); }

let st;
cards.addEventListener("scroll",()=>{clearTimeout(st); st=setTimeout(()=>{
  let p=Math.round(cards.scrollLeft/width());
  if(p>=SEQ.length-1){ jump(1); p=1; }        // past the tail clone → real first
  else if(p<=0){ jump(SEQ.length-2); p=SEQ.length-2; }  // past the head clone → real last
  const k=p-1;
  if(k!==S.i && k>=0 && k<5){ S.i=k; paintSlice(); }
},120);},{passive:true});
cards.addEventListener("pointerdown",pause);
cards.addEventListener("wheel",pause,{passive:true});
cards.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"){pause();go(S.i+1);} if(e.key==="ArrowLeft"){pause();go(S.i-1);}});
$("nav").addEventListener("click",e=>{const b=e.target.closest("button"); if(b){pause();go(+b.dataset.i);}});
addEventListener("resize",()=>jump(S.i+1));

/* ── segmented toggle ─────────────────────────────────────────── */
$("modeToggle").addEventListener("change",e=>{
  S.mode = e.target.checked ? "chill" : "move"; render();
});
$("push").addEventListener("input",e=>{
  S.push=+e.target.value; $("pushVal").textContent=S.push;
  S.slices=simulate(S.push); render();
});

(async()=>{
  try{ S.slices=await fetchLive();
    $("src").textContent="Live · Open-Meteo · HRRR 3 km"; $("src").classList.add("live"); }
  catch(err){ S.slices=simulate(S.push);
    $("src").textContent="Simulated · no network"; $("simWrap").hidden=false; }
  render(); start();
})();
})();
</script>
</body>
</html>
